<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenbis 2 - Stratejik Rapor</title>
    <style>
        :root { --accent: #38bdf8; --warning: #f59e0b; --danger: #ef4444; --success: #10b981; --bg: #0a0f1e; --card: #161f32; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e2e8f0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: var(--card); padding: 35px; border-radius: 24px; border: 1px solid #1e293b; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .kb-logo { font-size: 50px; font-weight: 900; background: linear-gradient(135deg, var(--accent), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .form-section { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 15px; }
        .ana-btn { width: 100%; padding: 18px; background: linear-gradient(90deg, var(--accent), #818cf8); color: #0a0f1e; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 30px; }

        .rapor-baslik { display: none; padding: 20px; background: #1e293b; border-radius: 15px; margin-bottom: 25px; border-left: 5px solid var(--accent); }
        
        .ev-izgarasi { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .ev-kart { background: #1e293b; border-radius: 18px; border: 1px solid #334155; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .ev-ust { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .ev-no { font-size: 32px; font-weight: 900; opacity: 0.2; }
        
        /* Renk Kodları */
        .status-normal { border-top: 4px solid var(--accent); }
        .status-sıkıntı { border-top: 4px solid var(--danger); background: rgba(239, 68, 68, 0.05); }
        .status-azam { border-top: 4px solid var(--warning); background: rgba(245, 158, 11, 0.1); }

        .ev-detay { display: none; padding: 20px; background: #0f172a; border-top: 1px solid #334155; }
        .badge { font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; display: inline-block; margin-bottom: 10px; }
        
        .wp-mini-btn { display: block; width: 100%; padding: 10px; background: #25d366; color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; margin-top: 15px; }
        .footer { text-align: center; margin-top: 50px; color: #64748b; font-size: 12px; border-top: 1px solid #1e293b; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><div class="kb-logo">KB</div></div>

    <div class="form-section">
        <input type="text" id="isim" placeholder="Sayın (İsim Soyisim)">
        <input type="number" id="ebced" placeholder="Ebced Değeri">
        <input type="date" id="tarih">
    </div>
    <button class="ana-btn" onclick="kenbisRaporla()">Stratejik Analizi Başlat</button>

    <div id="raporBaslik" class="rapor-baslik"></div>
    <div class="ev-izgarasi" id="evListesi"></div>

    <div class="footer">© 2026 Kenbis Çalışmaları - Her Hakkı Mahfuzdur.</div>
</div>

<script>
const EV_BILGILERI = {
    1: "Kişilik ve Benlik", 2: "Rızık ve Özdeğer", 3: "İletişim", 4: "Aile ve Kökler",
    5: "Yaratıcılık ve Aşk", 6: "Sağlık ve Hizmet", 7: "Eş ve Ortaklık", 8: "Dönüşüm ve Kriz",
    9: "İlim ve Vizyon", 10: "Kariyer", 11: "Sosyal Çevre", 12: "Teslimiyet"
};

const ESMALAR = {
    "KOD_1": { 1:["Ya Malik","Ya Kuddüs"], 8:["Ya Kahhar"], 2:["Ya Gani"], 7:["Ya Vedüd"] },
    "KOD_8": { 7:["Ya Gani"], 8:["Ya Mümit"], 2:["Ya Kafi"] },
    "KOD_9": { 1:["Ya Malik","Ya Müntakim"], 8:["Ya Kahhar"], 9:["Ya Gaffar"] }
    // Diğer kodlar verilerinizden türetilir...
};

const ISMI_AZAM_MAP = { 1:["VENUS","GUNES"], 3:["MERKUR","JUPITER"], 8:["VENUS"], 9:["MARS"] };

const VAKITLER = [
    { gez: "MARS", bas: "03-20", bit: "04-19", evler: [1, 8], burc: "Koç" },
    { gez: "VENUS", bas: "04-20", bit: "05-19", evler: [2, 7], burc: "Boğa" },
    { gez: "MERKUR", bas: "05-20", bit: "06-19", evler: [3, 6], burc: "İkizler" }
    // ... Tüm tarihler
];

function kenbisRaporla() {
    const ad = document.getElementById('isim').value || "Ziyaretçi";
    const ebced = parseInt(document.getElementById('ebced').value);
    const tarihRaw = document.getElementById('tarih').value;
    if(!ebced || !tarihRaw) return;

    const tarih = new Date(tarihRaw);
    const ayGun = (tarih.getMonth()+1).toString().padStart(2,'0') + "-" + tarih.getDate().toString().padStart(2,'0');
    const kodNo = (ebced % 9 || 9);
    
    // Burç ve Evre Tespiti
    let aktifVakit = VAKITLER.find(v => ayGun >= v.bas && ayGun <= v.bit) || { gez: "Bilinmeyen", burc: "Bilinmeyen", evler:[] };
    
    document.getElementById('raporBaslik').style.display = "block";
    document.getElementById('raporBaslik').innerHTML = `<h3>Sayın ${ad}, ${aktifVakit.burc} burcusunuz.</h3><p>12 evlik stratejik analiziniz ve esma tertipleriniz aşağıdadır. Detaylar için kartlara tıklayınız.</p>`;

    const liste = document.getElementById('evListesi');
    liste.innerHTML = "";

    for(let i=1; i<=12; i++) {
        const isSıkıntı = aktifVakit.evler.includes(i);
        const isAzam = (ISMI_AZAM_MAP[kodNo] && ISMI_AZAM_MAP[kodNo].includes(aktifVakit.gez) && isSıkıntı);
        
        let statusClass = "status-normal";
        if(isSıkıntı) statusClass = "status-sıkıntı";
        if(isAzam) statusClass = "status-azam";

        const etki = (i % 2 === 0) ? "İçsellikten" : "Dışsallıktan";
        const mizac = isAzam ? "Celal" : (isSıkıntı ? "Cemal/Celal Karma" : "Cemal");
        
        const kart = document.createElement('div');
        kart.className = `ev-kart ${statusClass}`;
        kart.onclick = function() {
            const detay = this.querySelector('.ev-detay');
            detay.style.display = detay.style.display === 'block' ? 'none' : 'block';
        };

        const esmaList = (ESMALAR["KOD_"+kodNo] && ESMALAR["KOD_"+kodNo][i]) ? ESMALAR["KOD_"+kodNo][i].join(", ") : "Rehberden İsteyiniz";

        kart.innerHTML = `
            <div class="ev-ust">
                <div>
                    <strong style="display:block; font-size:18px;">${i}. Ev</strong>
                    <small style="color:var(--accent)">${EV_BILGILERI[i]}</small>
                </div>
                <div class="ev-no">${i}</div>
            </div>
            <div class="ev-detay">
                ${isAzam ? '<span class="badge" style="background:var(--warning); color:#000">İSMİ AZAM DÜĞÜMÜ</span>' : ''}
                <span class="badge" style="background:${isSıkıntı ? 'var(--danger)' : 'var(--success)'}">${etki} ${mizac}</span>
                <p style="font-size:13px; margin:10px 0;"><strong>Evre Durumu:</strong> ${isSıkıntı ? 'Bu ev şu an sınav merkezinizdir.' : 'Dengeli etki.'}</p>
                <div style="background:#161f32; padding:10px; border-radius:8px; border:1px dashed var(--accent)">
                    <small style="color:var(--accent)">STRATEJİK ESMALAR:</small><br>
                    <strong style="font-size:14px;">${esmaList}</strong>
                </div>
                <a href="https://wa.me/905337381237?text=Merhaba, ${i}. evimdeki ${mizac} etki için danışmanlık raporu talep ediyorum." target="_blank" class="wp-mini-btn">Bu Ev İçin Danışmanlık Al</a>
            </div>
        `;
        liste.appendChild(kart);
    }
}
</script>
</body>
</html>
