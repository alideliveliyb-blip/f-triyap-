<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenbis 2 - Stratejik Analiz Modülü</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0f1e; color: #e2e8f0; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: #161f32; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); border: 1px solid #1e293b; }
        
        /* Logo ve Başlık */
        .header { text-align: center; margin-bottom: 30px; }
        .kb-logo { font-size: 48px; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        .kb-sub { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 4px; margin-top: -10px; }

        .input-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        
        button { width: 100%; padding: 18px; background: linear-gradient(90deg, #38bdf8, #818cf8); color: #0a0f1e; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }

        .sonuc-panel { display: none; margin-top: 40px; animation: fadeIn 0.5s ease; }
        .sıkıntı-box { background: #450a0a; border: 1px solid #991b1b; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .ev-karti { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 15px; border-left: 6px solid #38bdf8; position: relative; }
        
        /* İsmi Azam Uyarı Tasarımı */
        .ismi-azam-warning { border-color: #f59e0b !important; background: #451a03 !important; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 900; text-transform: uppercase; }
        .badge-celal { background: #ef4444; color: white; }
        .badge-cemal { background: #10b981; color: white; }
        .badge-azam { background: #f59e0b; color: #000; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }

        /* Footer */
        .footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #1e293b; font-size: 12px; color: #64748b; }
        .whatsapp-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #25d366; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .whatsapp-btn:hover { background: #128c7e; transform: scale(1.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="kb-logo">KB</div>
        <div class="kb-sub">Kenbis 2 Analiz</div>
    </div>
    
    <div class="input-box">
        <input type="number" id="ebced" placeholder="Ebced Değeri">
        <input type="date" id="tarih">
    </div>
    <button onclick="kenbisAnaliz()">Stratejik Analizi Başlat</button>

    <div id="sonucAlani" class="sonuc-panel">
        <div class="sıkıntı-box">
            <h3 style="color:#f87171; margin-top:0;">⚠️ Birincil Sıkıntı Tespiti (Evre Gözlemi)</h3>
            <div id="anaSıkıntı"></div>
        </div>

        <div id="evDetaylari"></div>
    </div>

    <div class="footer">
        <p>© 2026 Kenbis Çalışmaları - Her Hakkı Mahfuzdur.</p>
        <a href="https://wa.me/905XXXXXXXXXX" class="whatsapp-btn">🟢 Danışmanlık İçin WhatsApp Hattı</a>
    </div>
</div>

<script>
const DATA = {
    "MARS": {
        zaman: { bas: "03-21", bit: "04-03", risk: "Yaşam enerjisinde blokaj, disiplinsizlik ve yön kaybı sınavı." },
        kodlar: {
            "KOD_1": { icDis: "Dışsallıktan Gelen Sıkıntı", ton: "Cemal (Uyuşturucu/Sinsi)", azam: false },
            "KOD_8": { icDis: "Alt Esmalardan Gelen Sıkıntı", ton: "Celal (Baskıcı/Sert)", azam: false },
            "KOD_9": { icDis: "İçsel ve Dışsal Kuşatılmış Sıkıntı", ton: "Celal", azam: true }
        }
    },
    "VENUS": {
        zaman: { bas: "04-20", bit: "05-04", risk: "Değer algısında bozulma, iffet sınavı ve bağımlılık kilitleri." },
        kodlar: {
            "KOD_1": { icDis: "İçsel ve Dışsal Karma Sıkıntı", ton: "Cemal", azam: true },
            "KOD_8": { icDis: "İçsel ve Dışsal Karma Sıkıntı", ton: "Celal", azam: true }
        }
    }
    // Diğer gezegen verileri slayttaki tarih aralıklarına göre buraya genişletilecek...
};

function kenbisAnaliz() {
    const ebced = parseInt(document.getElementById('ebced').value);
    const tarihStr = document.getElementById('tarih').value;
    if(!ebced || !tarihStr) return;

    const tarih = new Date(tarihStr);
    const ayGun = (tarih.getMonth() + 1).toString().padStart(2, '0') + "-" + tarih.getDate().toString().padStart(2, '0');
    const kodKey = "KOD_" + (ebced % 9 || 9);

    document.getElementById('sonucAlani').style.display = 'block';

    // 1. Evre Gözlemi
    let anaSıkıntıDiv = document.getElementById('anaSıkıntı');
    let bulundu = false;
    for(let gez in DATA) {
        if(ayGun >= DATA[gez].zaman.bas && ayGun <= DATA[gez].zaman.bit) {
            anaSıkıntıDiv.innerHTML = `<strong>${gez} Evresindesiniz:</strong> ${DATA[gez].zaman.risk}`;
            bulundu = true;
            break;
        }
    }
    if(!bulundu) anaSıkıntıDiv.innerHTML = "Doğum tarihiniz genel döngüde; ancak kodunuzdaki düğümler aktif.";

    // 2. İsmi Azam ve Düğüm Analizi
    const detayDiv = document.getElementById('evDetaylari');
    detayDiv.innerHTML = "";

    for(let gez in DATA) {
        if(DATA[gez].kodlar[kodKey]) {
            const analiz = DATA[gez].kodlar[kodKey];
            const kart = document.createElement('div');
            kart.className = `ev-karti ${analiz.azam ? 'ismi-azam-warning' : ''}`;
            
            let tonBadge = `<span class="badge ${analiz.ton.includes('Celal') ? 'badge-celal' : 'badge-cemal'}">${analiz.ton}</span>`;
            let azamBadge = analiz.azam ? `<span class="badge badge-azam">⚠️ İSMİ AZAM (EN BÜYÜK DÜĞÜM)</span>` : "";

            kart.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                    <strong style="color:#38bdf8; font-size:18px;">${gez} Bağlantılı Sınav Alanı</strong>
                    <div>${tonBadge}</div>
                </div>
                ${azamBadge}
                <div style="margin-top:12px;">
                    <p style="font-size:13px; color:#94a3b8; margin:0;">ETKİ KAYNAĞI:</p>
                    <p style="font-weight:bold; margin:4px 0;">${analiz.icDis}</p>
                    <p style="font-size:14px; color:#cbd5e1; border-top: 1px solid #334155; padding-top:10px; margin-top:10px;">
                        Bu ev konusu hayatınızdaki tıkanıklığın merkezidir. Çözüm için ilgili terkip çalışılmalıdır.
                    </p>
                </div>
            `;
            detayDiv.appendChild(kart);
        }
    }
}
</script>
</body>
</html>
