};

function kenbisDerinAnaliz() {
    const ad = document.getElementById('isim').value || "Ziyaretçi";
    const ebced = parseInt(document.getElementById('ebced').value);
    const tarihStr = document.getElementById('tarih').value;
    if(!ebced || !tarihStr) return;

    const tarih = new Date(tarihStr);
    const ayGun = (tarih.getMonth()+1).toString().padStart(2,'0') + "-" + tarih.getDate().toString().padStart(2,'0');
    const kodNo = (ebced % 9 || 9);
    const kodKey = "KOD_" + kodNo;

    document.getElementById('sonucAlani').style.display = 'block';
    document.getElementById('hitapMesaji').innerText = `Sayın ${ad}, Stratejik Analiziniz Tamamlandı:`;

    let evreRisk = "Genel döngü dengeli görünmekle birlikte, şahsi kod düğümleriniz incelenmelidir.";
    for(let g in ZAMAN_ZEMIN) {
        if(ayGun >= ZAMAN_ZEMIN[g].bas && ayGun <= ZAMAN_ZEMIN[g].bit) {
            evreRisk = `⚠️ ${g} ZAMANI ETKİSİ: ${ZAMAN_ZEMIN[g].risk}`;
        }
    }
    document.getElementById('evreGozlemi').innerHTML = evreRisk;

    const liste = document.getElementById('evListesi');
    liste.innerHTML = "";

    for(let i=1; i<=12; i++) {
        let isAzam = false;
        let etkiAciklama = "Dönemsel Gözlem";
        let mizaç = "cemal";

        for(let g in ZAMAN_ZEMIN) {
            const zd = ZAMAN_ZEMIN[g];
            if(zd.azamEvler.includes(i)) {
                // Eğer bu ev o gezegenin ana evi ise ve kod ile eşleşiyorsa
                if(zd.kodlar[kodKey]) { isAzam = true; etkiAciklama = zd.kodlar[kodKey]; }
                mizaç = etkiAciklama.toLowerCase().includes("celal") ? "celal" : "cemal";
            }
        }

        const kart = document.createElement('div');
        kart.className = `ev-kart ${isAzam ? 'azam-kart' : ''}`;
        const esmalar = (KOD_KUTUPHANESI[kodKey] && KOD_KUTUPHANESI[kodKey][i]) ? KOD_KUTUPHANESI[kodKey][i].join(", ") : "Dengeleyici Terkib Çalışılmalı";

        kart.innerHTML = `
            <div class="ev-no">${i}</div>
            ${isAzam ? '<span class="azam-uyari">⚠️ İSMİ AZAM (ANA DÜĞÜM)</span>' : ''}
            <span class="badge ${mizaç}">${mizaç.toUpperCase()} ETKİ</span>
            <span class="etki-notu">${etkiAciklama}</span>
            <div class="esma-box">
                <small style="color:#38bdf8; display:block; margin-bottom:4px;">STRATEJİK ANAHTAR:</small>
                <span style="color:white; font-size:15px; font-weight:600;">${esmalar}</span>
            </div>
        `;
        liste.appendChild(kart);
    }
}
