<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenbis 2 - Stratejik Analiz Sistemi</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0f1e; color: #e2e8f0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; background: #161f32; padding: 35px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); border: 1px solid #1e293b; }
        
        /* Logo ve Başlık */
        .header { text-align: center; margin-bottom: 35px; }
        .kb-logo { font-size: 64px; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        .kb-sub { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 6px; margin-top: -10px; }
        
        /* Form Alanı */
        .form-section { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; background: linear-gradient(90deg, #38bdf8, #818cf8); color: #0a0f1e; border: none; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; margin-bottom: 30px; transition: 0.3s; }
        button:hover { transform: scale(1.01); box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); }

        /* Sonuç Panelleri */
        .sonuc-ekrani { display: none; }
        .vakit-paneli { background: #450a0a; border: 2px solid #991b1b; padding: 25px; border-radius: 20px; margin-bottom: 35px; }
        
        .ev-izgarasi { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .ev-kart { background: #1e293b; padding: 30px; border-radius: 20px; border-top: 4px solid #38bdf8; position: relative; transition: 0.3s; cursor: help; }
        
        /* Ev Numarası - Çok Belirgin */
        .ev-no { font-size: 48px; font-weight: 900; color: rgba(51, 65, 85, 0.4); position: absolute; right: 20px; top: 10px; z-index: 1; }
        
        /* İsmi Azam ve Sıkıntılı Durum */
        .azam-kart { border-top: 5px solid #f59e0b !important; background: #451a03 !important; box-shadow: 0 0 30px rgba(245, 158, 11, 0.2); }
        .azam-label { color: #f59e0b; font-weight: 900; font-size: 14px; display: block; margin-bottom: 10px; text-transform: uppercase; border: 1px solid #f59e0b; padding: 5px; text-align: center; border-radius: 8px; }
        .sıkıntılı-text { color: #f87171; font-weight: bold; font-size: 13px; display: block; margin-bottom: 5px; }

        .badge { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .celal { background: #ef4444; color: white; }
        .cemal { background: #10b981; color: white; }
        
        .esma-box { background: #0f172a; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px dashed #38bdf8; position: relative; z-index: 2; }
        
        /* Footer */
        .footer { text-align: center; margin-top: 60px; border-top: 1px solid #1e293b; padding-top: 30px; color: #64748b; font-size: 13px; }
        .wa-btn { display: inline-block; margin-top: 20px; padding: 14px 28px; background: #25d366; color: white; border-radius: 50px; text-decoration: none; font-weight: 800; font-size: 16px; transition: 0.3s; }

        /* Tooltip (Açıklama) Stili */
        .ev-kart:hover::after {
            content: attr(data-konu);
            position: absolute;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%);
            background: #334155;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            width: 200px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="kb-logo">KB</div>
        <div class="kb-sub">Kenbis 2 Stratejik Analiz</div>
    </div>

    <div class="form-section">
        <div><label>Sayın (İsim Soyisim)</label><input type="text" id="isim" placeholder="Adınız"></div>
        <div><label>Ebced Değeri</label><input type="number" id="ebced" placeholder="Değer"></div>
        <div><label>Miladi Doğum Tarihi</label><input type="date" id="tarih"></div>
    </div>
    <button onclick="kenbisAnalizModulu()">Analizi Görüntüle</button>

    <div id="sonucAlani" class="sonuc-ekrani">
        <div class="vakit-paneli">
            <h3 id="hitap" style="margin-top:0; color:#38bdf8;"></h3>
            <p id="vakitGozlemi" style="color:#f87171; font-weight:bold; margin-bottom:0;"></p>
        </div>
        <div class="ev-izgarasi" id="evListesi"></div>
    </div>

    <div class="footer">
        <p>© 2026 Kenbis Çalışmaları - Her Hakkı Mahfuzdur.</p>
        <a href="https://wa.me/905337381237" target="_blank" class="wa-btn">🟢 Danışmanlık İçin WhatsApp Hattı</a>
    </div>
</div>

<script>
const EV_KONULARI = {
    1: "Kişilik, karakter, dış görünüş ve benlik bilinci.",
    2: "Maddi kaynaklar, rızık, özdeğer ve kazançlar.",
    3: "Yakın çevre, kardeşler, iletişim ve temel eğitim.",
    4: "Aile, kökler, ev ve iç dünyadaki güven hissi.",
    5: "Yaratıcılık, çocuklar, hobiler ve aşk hayatı.",
    6: "Hizmet, rutin işler, sağlık ve çalışma koşulları.",
    7: "Eş, evlilik, ortaklıklar ve açık düşmanlıklar.",
    8: "Dönüşüm, ortaklaşa paralar, krizler ve sırlar.",
    9: "Yüksek ilim, inançlar, uzak yolculuklar ve vizyon.",
    10: "Kariyer, toplum önündeki statü ve sorumluluklar.",
    11: "Sosyal gruplar, idealler, umutlar ve arkadaşlıklar.",
    12: "Bilinçaltı, gizli düşmanlar, izolasyon ve teslimiyet."
};

const ISMI_AZAM_MAP = {
    1: ["VENUS", "GUNES"],
    2: ["AY"],
    3: ["MERKUR", "JUPITER", "VENUS", "SATURN", "GUNES"],
    4: ["AY"],
    5: ["JUPITER"],
    6: ["AY"],
    7: ["JUPITER"],
    8: ["VENUS"],
    9: ["MARS"]
};

const VAKIT_DONGUSU = [
    { gez: "MARS", burc: "Koç", bas: "03-20", bit: "04-19", evler: [1, 8] },
    { gez: "VENUS", burc: "Boğa", bas: "04-20", bit: "05-19", evler: [2, 7] },
    { gez: "MERKUR", burc: "İkizler", bas: "05-20", bit: "06-19", evler: [3, 6] },
    { gez: "AY", burc: "Yengeç", bas: "06-20", bit: "07-19", evler: [4] },
    { gez: "GUNES", burc: "Aslan", bas: "07-20", bit: "08-19", evler: [5] },
    { gez: "MERKUR", burc: "Başak", bas: "08-20", bit: "09-19", evler: [3, 6] },
    { gez: "VENUS", burc: "Terazi", bas: "09-20", bit: "10-19", evler: [2, 7] },
    { gez: "MARS", burc: "Akrep", bas: "10-20", bit: "11-19", evler: [1, 8] },
    { gez: "JUPITER", burc: "Yay", bas: "11-20", bit: "12-18", evler: [9, 12] },
    { gez: "SATURN", burc: "Oğlak", bas: "12-20", bit: "01-19", evler: [10, 11] },
    { gez: "SATURN", burc: "Kova", bas: "01-20", bit: "02-19", evler: [10, 11] },
    { gez: "JUPITER", burc: "Balık", bas: "02-20", bit: "03-19", evler: [9, 12] }
];

const ESMA_BANKASI = {
    "KOD_1": { 1: ["Ya Malik", "Ya Kuddüs"], 5: ["Ya Hay", "Ya Kayyum"], 2: ["Ya Gani"], 7: ["Ya Vedüd"] },
    "KOD_3": { 3: ["Ya Ali", "Ya Azim"], 9: ["Ya Hakim"], 10: ["Ya Fettah"] },
    "KOD_8": { 2: ["Ya Kafi"], 7: ["Ya Gani"], 8: ["Ya Muktedir"] },
    "KOD_9": { 1: ["Ya Malik", "Ya Müntakim"], 8: ["Ya Kahhar"] }
    // Diğer kodlar verildikçe aynı hiyerarşiyle eklenecek.
};

function kenbisAnalizModulu() {
    const ad = document.getElementById('isim').value || "Ziyaretçi";
    const ebced = parseInt(document.getElementById('ebced').value);
    const tarihStr = document.getElementById('tarih').value;
    if(!ebced || !tarihStr) return;

    const tarih = new Date(tarihStr);
    const ayGun = (tarih.getMonth()+1).toString().padStart(2,'0') + "-" + tarih.getDate().toString().padStart(2,'0');
    const kodNo = (ebced % 9 || 9);
    const kodKey = "KOD_" + kodNo;

    document.getElementById('sonucAlani').style.display = 'block';
    document.getElementById('hitap').innerText = `Sayın ${ad}, Analiziniz Hazırlandı:`;

    let aktifVakit = null;
    for(let v of VAKIT_DONGUSU) {
        if(ayGun >= v.bas && ayGun <= v.bit) { aktifVakit = v; break; }
    }
    document.getElementById('vakitGozlemi').innerText = aktifVakit ? `${aktifVakit.gez} Vakti (${aktifVakit.burc} Burcu): Bu evredeki kod düğümleriniz sınav merkezinizdir.` : "Döngü geçiş aralığındasınız.";

    const liste = document.getElementById('evListesi');
    liste.innerHTML = "";

    for(let i=1; i<=12; i++) {
        let isAzam = (ISMI_AZAM_MAP[kodNo] && ISMI_AZAM_MAP[kodNo].includes(aktifVakit?.gez));
        let etkiTuru = "Dönemsel Gözlem";
        let mizac = "cemal";

        if(aktifVakit?.evler.includes(i)) {
            etkiTuru = i % 2 === 0 ? "İçsellikten Gelen" : "Dışsallıktan Gelen";
            mizac = isAzam ? "celal" : "cemal";
        }

        const kart = document.createElement('div');
        kart.className = `ev-kart ${isAzam ? 'azam-kart' : ''}`;
        kart.setAttribute('data-konu', EV_KONULARI[i]);
        
        const esmalar = (ESMA_BANKASI[kodKey] && ESMA_BANKASI[kodKey][i]) ? ESMA_BANKASI[kodKey][i].join(", ") : "Dengeleyici Terkib Gerekli";

        kart.innerHTML = `
            <div class="ev-no">${i}</div>
            ${isAzam ? '<span class="azam-label">⚠️ İSMİ AZAM (ANA DÜĞÜM)</span>' : ''}
            <span class="badge ${mizac}">${mizac.toUpperCase()} ETKİ</span>
            <span class="sıkıntılı-text">${etkiTuru} Sıkıntı</span>
            <div class="esma-box">
                <small style="color:#38bdf8; display:block; margin-bottom:5px;">STRATEJİK ANAHTAR:</small>
                <span style="color:white; font-size:15px; font-weight:700;">${esmalar}</span>
            </div>
        `;
        liste.appendChild(kart);
    }
}
</script>
</body>
</html>
