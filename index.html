function analizEt() {
    const ebced = parseInt(document.getElementById('ebced').value);
    const tarih = new Date(document.getElementById('tarih').value);
    
    if (!ebced || isNaN(tarih)) { alert("Lütfen ebced ve tarih bilgilerini girin."); return; }

    const gun = tarih.getDate();
    const ay = tarih.getMonth() + 1;
    const burclar = [
        { isim: "Oğlak", gun: 20, ay: 1 }, { isim: "Kova", gun: 19, ay: 2 }, { isim: "Balık", gun: 20, ay: 3 },
        { isim: "Koç", gun: 20, ay: 4 }, { isim: "Boğa", gun: 21, ay: 5 }, { isim: "İkizler", gun: 21, ay: 6 },
        { isim: "Yengeç", gun: 22, ay: 7 }, { isim: "Aslan", gun: 23, ay: 8 }, { isim: "Başak", gun: 23, ay: 9 },
        { isim: "Terazi", gun: 23, ay: 10 }, { isim: "Akrep", gun: 22, ay: 11 }, { isim: "Yay", gun: 22, ay: 12 }
    ];
    let burc = burclar.find(b => (ay < b.ay || (ay === b.ay && gun <= b.gun)))?.isim || "Oğlak";

    let kodNo = ebced % 9;
    if (kodNo === 0) kodNo = 9;
    const kodKey = "KOD_" + kodNo;

    document.getElementById('sonuc').style.display = 'block';
    document.getElementById('resBurc').innerText = "Burç: " + burc;
    document.getElementById('resKod').innerText = "Sistem Kodu: " + kodKey;

    const liste = document.getElementById('evListesi');
    liste.innerHTML = "";
    
    const veriler = veriHavuzu[kodKey];
    for(let i=1; i<=12; i++) {
        const kart = document.createElement('div');
        kart.className = 'ev-karti';
        kart.innerHTML = `<span class="ev-no">${i}. Ev</span> <span class="esma-metin">${veriler[i] ? veriler[i].join(", ") : "Veri bulunamadı."}</span>`;
        liste.appendChild(kart);
    }
}
