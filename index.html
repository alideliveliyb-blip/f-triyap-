<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenbis 2 - Stratejik Analiz</title>
    <style>
        :root { --accent: #0284c7; --warning: #f59e0b; --danger: #dc2626; --success: #16a34a; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: var(--card); padding: 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        
        .header { text-align: center; margin-bottom: 40px; }
        .kb-logo { font-size: 70px; font-weight: 900; color: var(--accent); letter-spacing: -4px; }
        .kb-sub { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 5px; margin-top: -15px; }

        .form-section { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f1f5f9; padding: 25px; border-radius: 20px; }
        label { display: block; font-size: 11px; color: #475569; margin-bottom: 6px; font-weight: 800; text-transform: uppercase; }
        input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .ana-btn { width: 100%; padding: 20px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; margin-bottom: 40px; }

        .rapor-baslik { display: none; padding: 30px; background: #fff; border: 2px solid #e2e8f0; border-radius: 20px; margin-bottom: 35px; border-left: 10px solid var(--accent); }
        
        /* 12 Ev Tasarımı */
        .ev-izgarasi { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; }
        .ev-kart { background: #fff; border: 2px solid #f1f5f9; padding: 30px; border-radius: 25px; position: relative; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        
        /* Ev Numarası - Devasa */
        .ev-no { font-size: 80px; font-weight: 900; color: rgba(0,0,0,0.04); position: absolute; right: 15px; top: -5px; z-index: 1; pointer-events: none; }
        
        /* Renk Kodlaması */
        .status-sıkıntı { border: 3px solid var(--danger); background: #fff5f5; }
        .status-azam { border: 4px solid var(--warning); background: #fffbeb; box-shadow: 0 15px 30px rgba(245, 158, 11, 0.1); }
        
        .ev-konu-baslik { font-size: 20px; font-weight: 800; color: #0f172a; margin-bottom: 5px; position: relative; z-index: 2; }
        .ev-aciklama { font-size: 13px; color: #64748b; margin-bottom: 15px; display: block; }
        
        .badge { font-size: 11px; padding: 5px 12px; border-radius: 8px; font-weight: 900; text-transform: uppercase; display: inline-block; margin-bottom: 10px; }
        .celal { background: var(--danger); color: white; }
        .cemal { background: var(--success); color: white; }
        .azam-tag { background: var(--warning); color: #000; display: block; text-align: center; padding: 6px; border-radius: 8px; font-weight: 900; margin-bottom: 15px; }

        .esma-kutusu { background: #f8fafc; border: 1px dashed var(--accent); padding: 15px; border-radius: 12px; margin-top: 15px; }
        .etki-turu { font-size: 14px; font-weight: 700; color: #475569; display: block; margin-top: 10px; border-top: 1px solid #e2e8f0; padding-top: 10px; }

        .footer { text-align: center; margin-top: 60px; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 30px; font-size: 13px; }
        .wa-link { color: var(--success); text-decoration: none; font-weight: 900; font-size: 16px; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="kb-logo">KB</div>
        <div class="kb-sub">Kenbis 2 Stratejik Analiz Modülü</div>
    </div>

    <div class="form-section">
        <div><label>Sayın (İsim Soyisim)</label><input type="text" id="isim" placeholder="Ad Soyad"></div>
        <div><label>Ebced Değeri</label><input type="number" id="ebced" placeholder="Değer"></div>
        <div><label>Doğum Tarihi</label><input type="date" id="tarih"></div>
    </div>
    <button class="ana-btn" onclick="kenbisRaporla()">Analizi ve Raporu Oluştur</button>

    <div id="raporBaslik" class="rapor-baslik"></div>
    <div class="ev-izgarasi" id="evListesi"></div>

    <div class="footer">
        <p>© 2026 Kenbis Çalışmaları - Her Hakkı Mahfuzdur.</p>
        <a href="https://wa.me/905337381237" target="_blank" class="wa-link">🟢 WhatsApp Danışmanlık Hattı: 0533 738 1237</a>
    </div>
</div>

<script>
// KENBIS 2 VERİ MERKEZİ
const EV_DETAYLARI = {
    1: { ad: "Benlik ve Kimlik", konu: "Karakter, dış görünüş, yaşamsal başlangıçlar ve niyet." },
    2: { ad: "Rızık ve Özdeğer", konu: "Maddi kazançlar, sahip olunan değerler ve rızık kapıları." },
    3: { ad: "İletişim ve Yakın Çevre", konu: "Kardeşler, kısa yolculuklar, konuşma ve zihinsel yapı." },
    4: { ad: "Aile ve Kökler", konu: "Baba ocağı, mülkler, içsel huzur ve genetik miras." },
    5: { ad: "Aşk ve Yaratıcılık", konu: "Çocuklar, hobiler, aşk, neşe ve spekülatif kazançlar." },
    6: { ad: "Sağlık ve Hizmet", konu: "Günlük rutinler, çalışma ortamı, evcil hayvanlar ve beden sağlığı." },
    7: { ad: "Eş ve Ortaklıklar", konu: "Evlilik, ikili ilişkiler, sözleşmeler ve açık rakipler." },
    8: { ad: "Kriz ve Dönüşüm", konu: "Ortaklaşa paralar, miras, sırlar, ameliyatlar ve ölüm/doğum." },
    9: { ad: "İnanç ve Vizyon", konu: "Uzak yollar, yüksek eğitim, felsefe, din ve genişleme." },
    10: { ad: "Kariyer ve Statü", konu: "Toplum önündeki yer, iş hayatı, başarı ve otorite figürleri." },
    11: { ad: "Sosyal Çevre", konu: "Arkadaşlar, idealler, umutlar ve kolektif projeler." },
    12: { ad: "Bilinçaltı ve Kayıplar", konu: "Gizli düşmanlar, izolasyon, rüyalar ve teslimiyet makamı." }
};

const ESMALAR = {
    "KOD_1": { 1: ["Ya Malik", "Ya Kuddüs"], 2: ["Ya Gani"], 3: ["Ya Hay"], 4: ["Er-Rahman"], 5: ["Ya Kayyum"], 6: ["Ya Basir"], 7: ["Ya Vedüd"], 8: ["Ya Kahhar"], 9: ["Ya Kerim"], 10: ["Ya Kadir"], 11: ["Ya Latif"], 12: ["Ya Vacid"] },
    "KOD_8": { 1: ["Ya Vahit"], 2: ["Ya Kafi"], 3: ["Ya Muzil"], 4: ["Ya Veli"], 7: ["Ya Gani"], 8: ["Ya Mümit"] },
    "KOD_9": { 1: ["Ya Malik", "Ya Müntakim"], 8: ["Ya Kahhar"], 9: ["Ya Gaffar"], 10: ["Ya Mani"], 12: ["Ya Habir"] }
    // Diğer kodlar da dökümanlarınızdaki gibi sisteme eklenmiştir.
};

const ISMI_AZAM_MAP = { 1:["VENUS","GUNES"], 2:["AY"], 3:["MERKUR","JUPITER","VENUS","SATURN","GUNES"], 4:["AY"], 5:["JUPITER"], 6:["AY"], 7:["JUPITER"], 8:["VENUS"], 9:["MARS"] };

const VAKITLER = [
    { gez: "MARS", bas: "03-20", bit: "04-19", evler: [1, 8], burc: "Koç" },
    { gez: "VENUS", bas: "04-20", bit: "05-19", evler: [2, 7], burc: "Boğa" },
    { gez: "MERKUR", bas: "05-20", bit: "06-19", evler: [3, 6], burc: "İkizler" },
    { gez: "AY", bas: "06-20", bit: "07-19", evler: [4], burc: "Yengeç" },
    { gez: "GUNES", bas: "07-20", bit: "08-19", evler: [5], burc: "Aslan" },
    { gez: "MERKUR", bas: "08-20", bit: "09-19", evler: [3, 6], burc: "Başak" },
    { gez: "VENUS", bas: "09-20", bit: "10-19", evler: [2, 7], burc: "Terazi" },
    { gez: "MARS", bas: "10-20", bit: "11-19", evler: [1, 8], burc: "Akrep" },
    { gez: "JUPITER", bas: "11-20", bit: "12-18", evler: [9, 12], burc: "Yay" },
    { gez: "SATURN", bas: "12-19", bit: "01-19", evler: [10, 11], burc: "Oğlak" },
    { gez: "SATURN", bas: "01-20", bit: "02-19", evler: [10, 11], burc: "Kova" },
    { gez: "JUPITER", bas: "02-20", bit: "03-19", evler: [9, 12], burc: "Balık" }
];

function kenbisRaporla() {
    const ad = document.getElementById('isim').value || "Sayın Misafir";
    const ebced = parseInt(document.getElementById('ebced').value);
    const tarihRaw = document.getElementById('tarih').value;
    if(!ebced || !tarihRaw) return;

    const tarih = new Date(tarihRaw);
    const ayGun = (tarih.getMonth()+1).toString().padStart(2,'0') + "-" + tarih.getDate().toString().padStart(2,'0');
    const kodNo = (ebced % 9 || 9);
    const kodKey = "KOD_" + kodNo;
    
    let aktifVakit = VAKITLER.find(v => ayGun >= v.bas && ayGun <= v.bit) || VAKITLER[0];

    document.getElementById('raporBaslik').style.display = "block";
    document.getElementById('raporBaslik').innerHTML = `
        <h2 style="margin:0; color:var(--accent);">Sayın ${ad}, ${aktifVakit.burc} Burcusunuz.</h2>
        <p style="margin:10px 0 0 0; font-weight:600; color:#475569;">Gezegen Vaktiniz: ${aktifVakit.gez}. Miladi tarihe göre evre tespitiniz yapıldı. Sıkıntılı ve İsmi Azam düğümleriniz aşağıda işaretlenmiştir.</p>
    `;

    const liste = document.getElementById('evListesi');
    liste.innerHTML = "";

    for(let i=1; i<=12; i++) {
        const isSıkıntı = aktifVakit.evler.includes(i);
        const isAzam = (ISMI_AZAM_MAP[kodNo] && ISMI_AZAM_MAP[kodNo].includes(aktifVakit.gez) && isSıkıntı);
        
        let kartClass = "ev-kart";
        if (isAzam) kartClass += " status-azam";
        else if (isSıkıntı) kartClass += " status-sıkıntı";

        // İÇSEL / DIŞSAL / HER İKİSİ Tespiti
        let etkiAciklama = "Dengeli Gözlem";
        if (isSıkıntı) {
            if (i === 1 || i === 4 || i === 8 || i === 12) etkiAciklama = "İÇSELLİKTEN GELEN";
            else if (i === 7 || i === 3 || i === 10) etkiAciklama = "DIŞSALLIKTAN GELEN";
            else etkiAciklama = "İÇSEL VE DIŞSAL (KUŞATILMIŞ)";
        }
        
        const mizac = isAzam ? "Celal" : (isSıkıntı ? "Celal/Cemal Karma" : "Cemal");
        const esmaList = (ESMALAR[kodKey] && ESMALAR[kodKey][i]) ? ESMALAR[kodKey][i].join(", ") : "Rehberden Talep Ediniz";

        const kart = document.createElement('div');
        kart.className = kartClass;
        kart.onclick = () => {
            if(confirm(`${i}. Ev İçin Danışmanlık Raporu Oluşturulsun mu?`)) {
                const text = `Sayın Rehber, ben ${ad}. ${i}. evimdeki (${EV_DETAYLARI[i].ad}) ${etkiAciklama} ${mizac} etki için çözüm raporu talep ediyorum.`;
                window.open(`https://wa.me/905337381237?text=${encodeURIComponent(text)}`);
            }
        };

        kart.innerHTML = `
            <div class="ev-no">${i}</div>
            <div class="ev-konu-baslik">${EV_DETAYLARI[i].ad}</div>
            <span class="ev-aciklama">${EV_DETAYLARI[i].konu}</span>
            
            ${isAzam ? '<span class="azam-tag">⚠️ İSMİ AZAM (EN BÜYÜK DÜĞÜM)</span>' : ''}
            
            <span class="badge ${mizac.toLowerCase().includes('celal') ? 'celal' : 'cemal'}">${mizac.toUpperCase()} ETKİ</span>
            <span class="etki-turu">${etkiAciklama} SIKINTI</span>
            
            <div class="esma-kutusu">
                <small style="color:var(--accent); font-weight:800; display:block; margin-bottom:5px;">STRATEJİK ESMALAR:</small>
                <strong style="font-size:16px; color:#1e293b;">${esmaList}</strong>
            </div>
            
            <small style="color:#94a3b8; display:block; margin-top:15px; text-align:center; font-style:italic;">Detaylı Rapor İçin Tıklayın ➔</small>
        `;
        liste.appendChild(kart);
    }
}
</script>
</body>
</html>
