<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenbis 2 - Stratejik Analiz Sistemi</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0f1e; color: #e2e8f0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; background: #161f32; padding: 35px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); border: 1px solid #1e293b; }
        .header { text-align: center; margin-bottom: 35px; }
        .kb-logo { font-size: 64px; font-weight: 900; background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        .kb-sub { font-size: 14px; color: #94a3b8; text-transform: uppercase; letter-spacing: 6px; margin-top: -10px; }
        
        .form-section { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; color: white; font-size: 15px; }
        button.ana-btn { width: 100%; padding: 20px; background: linear-gradient(90deg, #38bdf8, #818cf8); color: #0a0f1e; border: none; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; margin-bottom: 30px; }

        .sonuc-ekrani { display: none; }
        .sıkıntı-panel { background: #450a0a; border: 2px solid #991b1b; padding: 25px; border-radius: 20px; margin-bottom: 35px; }
        
        .ev-izgarasi { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .ev-kart { background: #1e293b; padding: 30px; border-radius: 20px; border-top: 4px solid #38bdf8; position: relative; cursor: pointer; transition: 0.3s; }
        .ev-kart:hover { transform: translateY(-5px); background: #243147; }
        .ev-no { font-size: 48px; font-weight: 900; color: rgba(51, 65, 85, 0.4); position: absolute; right: 20px; top: 10px; z-index: 1; }
        
        .azam-kart { border-top: 5px solid #f59e0b !important; background: #451a03 !important; }
        .badge { font-size: 10px; padding: 4px 10px; border-radius: 6px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .celal { background: #ef4444; color: white; }
        .cemal { background: #10b981; color: white; }
        
        .esma-detay { background: #0f172a; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px dashed #38bdf8; display: none; }
        .detay-aktif { display: block !important; }

        .footer { text-align: center; margin-top: 60px; border-top: 1px solid #1e293b; padding-top: 30px; color: #64748b; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><div class="kb-logo">KB</div><div class="kb-sub">Kenbis 2 Stratejik Analiz</div></div>

    <div class="form-section">
        <input type="text" id="isim" placeholder="Sayın (İsim Soyisim)">
        <input type="number" id="ebced" placeholder="Ebced Değeri">
        <input type="date" id="tarih">
    </div>
    <button class="ana-btn" onclick="kenbisAnaliz()">Analizi ve Raporu Görüntüle</button>

    <div id="sonucAlani" class="sonuc-ekrani">
        <div class="sıkıntı-panel">
            <h3 id="hitap" style="margin:0; color:#38bdf8;"></h3>
            <p id="evreGozlemi" style="color:#f87171; font-weight:bold; margin-top:10px;"></p>
        </div>
        <div class="ev-izgarasi" id="evListesi"></div>
    </div>

    <div class="footer"><p>© 2026 Kenbis Çalışmaları - Her Hakkı Mahfuzdur. | WP: 05337381237</p></div>
</div>

<script>
// TÜM VERİ TABANI (KOD 1-9 ESMALARI)
const ESMA_KUTUPHANESI = {
    "KOD_1": { 1: ["El-Evvel", "El-Metin"], 2: ["El-Gani", "El-Hak"], 3: ["El-Hay", "El Fettah"], 4: ["Er-Rahman", "El-Afüv"], 5: ["El-Mütekebbir", "El-Hay"], 6: ["El-Kayyum", "El-Hak"], 7: ["El-Adl", "El-Latif"], 8: ["El-Kahhar", "Mâlikül-Mülk"], 9: ["El-Kerim", "El-Gaffar"], 10: ["El-Kâbiz", "El-Kerim"], 11: ["El-Latif", "El-Hafiz"], 12: ["El-Musavvir", "El-Vacid"] },
    "KOD_8": { 2: ["Ya Kafi"], 7: ["Ya Gani"], 8: ["Ya Muktedir", "Ya Mümit"] },
    "KOD_9": { 1: ["El-Cebbar", "El-Aziz"], 8: ["El-Muktedir", "El-Mümit"], 4: ["Er-Rahîm", "Er-Rauf"], 12: ["El-Habir", "El-Batın"] }
    // Diğer kodlar da aynı formatta eklenebilir
};

const ISMI_AZAM_LISTESI = { 1: ["VENUS", "GUNES"], 2: ["AY"], 3: ["MERKUR", "JUPITER", "SATURN"], 8: ["VENUS"], 9: ["MARS"] };

const VAKITLER = [
    { gez: "MARS", bas: "03-20", bit: "04-19", evler: [1, 8], risk: "Yön kaybı ve yaşam enerjisi düğümü." },
    { gez: "VENUS", bas: "04-20", bit: "05-19", evler: [2, 7], risk: "Değer algısı ve madde bağımlılığı sınavı." },
    { gez: "MERKUR", bas: "05-20", bit: "06-19", evler: [3, 6], risk: "İhlas ve zihinsel karmaşa düğümü." }
];

const EV_KONULARI = { 1: "Benlik", 2: "Rızık", 3: "İletişim", 4: "Aile", 5: "Aşk", 6: "Sağlık", 7: "Eş", 8: "Kriz", 9: "İlim", 10: "Kariyer", 11: "Çevre", 12: "Bilinçaltı" };

function wpMesaj(ev, etki, konu) {
    const ad = document.getElementById('isim').value || "Ziyaretçi";
    if(confirm(`${ev}. ev (${konu}) için danışmanlık almak ister misiniz?`)) {
        const metin = `Merhaba, Kenbis 2 analizimde ${ev}. evimde (${konu}) ${etki.toUpperCase()} etki tespit edildi. Bu düğümü nasıl çözebilirim?`;
        window.open(`https://wa.me/905337381237?text=${encodeURIComponent(metin)}`);
    }
}

function kenbisAnaliz() {
    const ad = document.getElementById('isim').value || "Ziyaretçi";
    const ebced = parseInt(document.getElementById('ebced').value);
    const tarih = new Date(document.getElementById('tarih').value);
    if(!ebced || isNaN(tarih)) return;

    const kodNo = (ebced % 9 || 9);
    const ayGun = (tarih.getMonth()+1).toString().padStart(2,'0') + "-" + tarih.getDate().toString().padStart(2,'0');
    
    document.getElementById('sonucAlani').style.display = 'block';
    document.getElementById('hitap').innerText = `Sayın ${ad},`;

    let aktifGez = "";
    for(let v of VAKITLER) { if(ayGun >= v.bas && ayGun <= v.bit) { aktifGez = v.gez; document.getElementById('evreGozlemi').innerText = `EVRE TESPİTİ: ${v.gez} Vakti - ${v.risk}`; } }

    const liste = document.getElementById('evListesi');
    liste.innerHTML = "";

    for(let i=1; i<=12; i++) {
        const isAzam = (ISMI_AZAM_LISTESI[kodNo] && ISMI_AZAM_LISTESI[kodNo].includes(aktifGez));
        const etki = (i % 2 === 0) ? "İçsel" : "Dışsal";
        const mizac = isAzam ? "celal" : "cemal";
        
        const kart = document.createElement('div');
        kart.className = `ev-kart ${isAzam ? 'azam-kart' : ''}`;
        kart.onclick = () => {
            kart.querySelector('.esma-detay').classList.toggle('detay-aktif');
            wpMesaj(i, `${etki} ${mizac}`, EV_KONULARI[i]);
        };

        const esmalar = (ESMA_KUTUPHANESI["KOD_"+kodNo] && ESMA_KUTUPHANESI["KOD_"+kodNo][i]) ? ESMA_KUTUPHANESI["KOD_"+kodNo][i].join(", ") : "Rehberden talep ediniz.";

        kart.innerHTML = `
            <div class="ev-no">${i}</div>
            ${isAzam ? '<span style="color:#f59e0b; font-weight:900; font-size:12px;">⚠️ İSMİ AZAM (ANA DÜĞÜM)</span>' : ''}
            <span class="badge ${mizac}">${etki} ${mizac.toUpperCase()}</span>
            <p style="font-size:14px; margin:5px 0;">Konu: ${EV_KONULARI[i]}</p>
            <div class="esma-detay">
                <small style="color:#38bdf8;">STRATEJİK ESMALAR:</small><br>
                <strong>${esmalar}</strong>
            </div>
            <small style="color:#94a3b8; display:block; margin-top:10px;">Rapor ve Esma için tıkla ➔</small>
        `;
        liste.appendChild(kart);
    }
}
</script>
</body>
</html>
